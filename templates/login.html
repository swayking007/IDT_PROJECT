{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FabriCAD – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <style>
    body {
        background-color: #f8fafc;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
    }
    .auth-container {
        background: white;
        border-radius: 12px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        padding: 30px;
        width: 100%;
        max-width: 450px;
    }
    .auth-header {
        text-align: center;
        margin-bottom: 25px;
    }
    .form-group-custom {
        margin-bottom: 1rem;
    }
    .form-group-custom label {
        display: block;
        font-size: 0.85rem;
        font-weight: 600;
        color: var(--text-secondary);
        margin-bottom: 0.25rem;
    }
    .form-control-custom {
        width: 100%;
        padding: 0.5rem 0.75rem;
        font-size: 0.9rem;
        border: 1px solid var(--border);
        border-radius: 6px;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control-custom:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(26,115,232,0.1);
    }
    .action-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text-primary);
        padding: 0.5rem 1rem;
        border-radius: 6px;
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        transition: all 0.2s;
    }
    .action-btn.primary {
        background: var(--primary);
        color: white;
        border-color: var(--primary);
    }
    .action-btn.primary:hover {
        background: #1557b0;
        border-color: #1557b0;
    }
  </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-header">
        <h3 class="fw-bold">Welcome to FabriCAD</h3>
        <p class="text-muted">Log in or create an account</p>
    </div>

    {% if messages %}
    <div class="alert alert-danger p-2 mb-3" style="font-size: 0.9rem;">
        {% for message in messages %}
        <div>{{ message }}</div>
        {% endfor %}
    </div>
    {% endif %}

    <ul class="nav nav-pills mb-4 nav-justified" id="authTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" data-bs-toggle="pill" data-bs-target="#loginView" type="button" role="tab" style="font-weight: 600;">Log In</button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" data-bs-toggle="pill" data-bs-target="#signupView" type="button" role="tab" style="font-weight: 600;">Sign Up</button>
        </li>
    </ul>

    <div class="tab-content">
        <div class="tab-pane fade show active" id="loginView" role="tabpanel">
            <form method="POST" action="{% url 'login' %}">
                {% csrf_token %}
                <div class="form-group-custom">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control-custom" placeholder="Enter username" required>
                </div>
                <div class="form-group-custom">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control-custom" placeholder="Enter password" required>
                </div>
                <button type="submit" class="action-btn primary w-100 mt-3 justify-content-center py-2">
                    <i class="bi bi-box-arrow-in-right me-2"></i> Log In
                </button>
            </form>
        </div>

        <div class="tab-pane fade" id="signupView" role="tabpanel">
            <form method="POST" action="{% url 'signup' %}">
                {% csrf_token %}
                <div class="form-group-custom">
                    <label>Full Name</label>
                    <input type="text" name="name" class="form-control-custom" placeholder="e.g., Demo User" required>
                </div>
                <div class="form-group-custom">
                    <label>Email</label>
                    <input type="email" name="email" class="form-control-custom" placeholder="demo@example.com" required>
                </div>
                <div class="form-group-custom">
                    <label>Username</label>
                    <input type="text" name="username" class="form-control-custom" placeholder="Choose a username" required>
                </div>
                <div class="form-group-custom">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control-custom" placeholder="Create a password" required>
                </div>
                <button type="submit" class="action-btn primary w-100 mt-3 justify-content-center py-2">
                    <i class="bi bi-person-plus me-2"></i> Create Account
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
